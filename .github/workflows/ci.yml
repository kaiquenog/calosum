name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint_types:
    name: Lint + Types + Harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e . --quiet
          pip install mypy ruff --quiet

      - name: Resolve changed files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git diff --name-only "origin/${{ github.base_ref }}...${{ github.sha }}" > changed_files.txt
          else
            git diff --name-only HEAD~1 HEAD > changed_files.txt || true
          fi
          cat changed_files.txt

      - name: Harness checks
        run: PYTHONPATH=src python3 -m calosum.harness_checks

      - name: Ruff (changed python files)
        shell: bash
        run: |
          CHANGED=$(grep -E '\.py$' changed_files.txt || true)
          if [[ -z "$CHANGED" ]]; then
            echo "ruff: no changed python files"
            exit 0
          fi
          ruff check $CHANGED

      - name: mypy strict (changed src modules)
        shell: bash
        run: |
          CHANGED=$(grep -E '^src/calosum/.+\.py$' changed_files.txt || true)
          if [[ -z "$CHANGED" ]]; then
            echo "mypy: no changed src/calosum modules"
            exit 0
          fi
          mypy --strict $CHANGED

  unit_tests:
    name: Unit Tests + Coverage Gate
    runs-on: ubuntu-latest
    needs: [lint_types]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e . --quiet
          pip install coverage --quiet

      - name: Resolve changed files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git diff --name-only "origin/${{ github.base_ref }}...${{ github.sha }}" > changed_files.txt
          else
            git diff --name-only HEAD~1 HEAD > changed_files.txt || true
          fi
          cat changed_files.txt

      - name: Run unit tests with coverage
        env:
          CALOSUM_INFRA_PROFILE: ephemeral
          MPLCONFIGDIR: /tmp/calosum_mplcfg
        run: |
          PYTHONPATH=src coverage run -m unittest discover -s tests -t .
          coverage json -o coverage.json
          coverage report

      - name: Coverage gate (new/changed modules >= 80%)
        run: |
          PYTHONPATH=src python3 scripts/coverage_gate_new_modules.py \
            --coverage-json coverage.json \
            --changed-files changed_files.txt \
            --minimum 80

  integration:
    name: Integration Gate (Ephemeral p95 <= 5s)
    runs-on: ubuntu-latest
    needs: [unit_tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e . --quiet

      - name: Run integration benchmark gate
        env:
          CALOSUM_INFRA_PROFILE: ephemeral
          CALOSUM_CI_BENCHMARK_TURNS: "20"
        run: |
          PYTHONPATH=src python3 scripts/ci_integration_benchmark.py \
            --turns 20 \
            --latency-p95-threshold-ms 5000 \
            --output-json docs/benchmarks/ci/integration_latest.json \
            --output-md docs/benchmarks/ci/integration_latest.md

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-benchmark-results
          path: docs/benchmarks/ci/

  benchmark_gate:
    name: Benchmark Gate (tool_success_rate regression <= 5%)
    runs-on: ubuntu-latest
    needs: [integration]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e . --quiet

      - name: Produce candidate benchmark
        env:
          CALOSUM_INFRA_PROFILE: ephemeral
          CALOSUM_CI_BENCHMARK_TURNS: "20"
        run: |
          PYTHONPATH=src python3 scripts/ci_integration_benchmark.py \
            --turns 20 \
            --latency-p95-threshold-ms 5000 \
            --output-json docs/benchmarks/ci/integration_latest.json \
            --output-md docs/benchmarks/ci/integration_latest.md

      - name: Compare against baseline gate
        run: |
          PYTHONPATH=src python3 scripts/ci_benchmark_gate.py \
            --baseline docs/benchmarks/ci/baseline.json \
            --candidate docs/benchmarks/ci/integration_latest.json \
            --metric tool_success_rate \
            --max-regression-percent 5.0

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-benchmark-results-final
          path: docs/benchmarks/ci/
