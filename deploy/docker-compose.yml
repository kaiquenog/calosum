services:
  orchestrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    environment:
      CALOSUM_LEFT_ENDPOINT: "http://host.docker.internal:11434/v1/chat/completions"
      CALOSUM_INFRA_PROFILE: docker
      CALOSUM_MEMORY_DIR: /data/memory
      CALOSUM_OTLP_JSONL: /data/telemetry/events.jsonl
      CALOSUM_VECTORDB_URL: http://qdrant:6333
      CALOSUM_DUCKDB_PATH: /data/state/semantic.duckdb
      CALOSUM_OTEL_COLLECTOR_ENDPOINT: http://otel-collector:4318
      CALOSUM_JAEGER_UI_URL: http://jaeger:16686
      # APIs de Modelos de Linguagem são consumidas nativamente do pacote httpx para web e HuggingFace endpoints
      # Logo, os containers fake de "left-hemisphere" foram aposentados.
    volumes:
      - ../.calosum-runtime:/data
      - ../src:/app/src
    depends_on:
      - qdrant
      - otel-collector
      - jaeger

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  otel-collector:
    image: otel/opentelemetry-collector:0.147.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    depends_on:
      - jaeger

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.15.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    expose:
      - "4317"
      - "4318"
      - "5778"
      - "9411"

volumes:
  calosum_data:
  qdrant_data:
