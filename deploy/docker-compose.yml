services:
  orchestrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    environment:
      CALOSUM_MODE: local
      CALOSUM_INFRA_PROFILE: docker
      CALOSUM_MEMORY_DIR: /data/memory
      CALOSUM_OTLP_JSONL: /data/telemetry/events.jsonl
      CALOSUM_VECTORDB_URL: http://qdrant:6333
      CALOSUM_DUCKDB_PATH: /data/state/semantic.duckdb
      CALOSUM_BRIDGE_STATE_DIR: /data/state/bridge
      CALOSUM_EVOLUTION_ARCHIVE_PATH: /data/state/evolution.jsonl
      CALOSUM_OTEL_COLLECTOR_ENDPOINT: http://otel-collector:4318
      CALOSUM_JAEGER_UI_URL: http://jaeger:16686
      CALOSUM_RIGHT_BACKEND: jepars
      CALOSUM_RIGHT_MODEL_PATH: /app/jepa_model
      CALOSUM_RIGHT_JEPARS_BINARY: jepa-rs
      CALOSUM_LEFT_BACKEND: rlm
      CALOSUM_BRIDGE_BACKEND: cross_attention
      # Deixa o .env ditar as configs do LLM para evitar hardcode do host.docker.internal quebrando a API da OpenAI
    volumes:
      - ../.calosum-runtime:/data
      - ../src:/app/src
      - ../adapters/jepa_predictor:/app/jepa_model:ro
    depends_on:
      - qdrant
      - otel-collector
      - jaeger
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  otel-collector:
    image: otel/opentelemetry-collector:0.147.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    depends_on:
      - jaeger

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.15.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    expose:
      - "4317"
      - "4318"
      - "5778"
      - "9411"

volumes:
  calosum_data:
  qdrant_data:
